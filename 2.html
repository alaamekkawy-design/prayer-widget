<!DOCTYPE html>
<html lang="ar" dir="rtl">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>ويدجيت التقويم الإسلامي</title>
<link href="https://fonts.googleapis.com/css2?family=Amiri:ital,wght@0,400;0,700;1,400&family=Cairo:wght@400;600;700;900&display=swap" rel="stylesheet">
<style>
  * { margin: 0; padding: 0; box-sizing: border-box; }

  body {
    background: #e8e8e8;
    display: flex;
    justify-content: center;
    align-items: flex-start;
    min-height: 100vh;
    font-family: 'Cairo', sans-serif;
    margin: 0;
    padding: 0;
    overflow-x: hidden;
  }

  .widget {
    background: #ffffff;
    width: 100%;
    max-width: 380px;
    border-radius: 4px;
    box-shadow: 0 4px 20px rgba(0,0,0,0.15);
    overflow: hidden;
    border: 1px solid #ddd;
    padding: 12px 8px 10px;
    box-sizing: border-box;
  }

  /* Day name header */
  .day-name-ar {
    text-align: center;
    font-family: 'Amiri', serif;
    font-size: 46px;
    font-weight: 700;
    color: #1a3a6b;
    line-height: 1;
    letter-spacing: -1px;
  }

  .day-name-en {
    text-align: center;
    font-size: 13px;
    font-weight: 600;
    color: #1a3a6b;
    letter-spacing: 3px;
    border: 1.5px solid #1a3a6b;
    display: inline-block;
    padding: 2px 18px;
    margin: 4px auto 10px;
    display: block;
    width: fit-content;
    margin-left: auto;
    margin-right: auto;
  }

  /* Date numbers row */
  .dates-row {
    display: flex;
    border-top: 1.5px solid #1a3a6b;
    border-bottom: 1.5px solid #1a3a6b;
    margin-bottom: 2px;
  }

  .date-block {
    flex: 1;
    text-align: center;
    padding: 4px 8px 0;
  }

  .date-block:first-child {
    border-left: 1.5px solid #1a3a6b;
  }

  .date-num {
    font-family: 'Amiri', serif;
    font-size: 80px;
    font-weight: 700;
    color: #1a3a6b;
    line-height: 0.95;
    display: block;
  }

  .date-month-ar {
    font-family: 'Amiri', serif;
    font-size: 22px;
    font-weight: 700;
    color: #1a3a6b;
    display: block;
    line-height: 1.2;
  }

  .date-year {
    font-family: 'Cairo', sans-serif;
    font-size: 20px;
    font-weight: 700;
    color: #1a3a6b;
    display: block;
    line-height: 1.3;
  }

  /* Gregorian line */
  .gregorian-line {
    display: flex;
    align-items: center;
    justify-content: center;
    gap: 8px;
    margin: 6px 0 4px;
    font-size: 11.5px;
    color: #1a3a6b;
    font-weight: 600;
    direction: ltr;
  }

  .gregorian-line .badge {
    background: #1a3a6b;
    color: white;
    padding: 1px 7px;
    border-radius: 10px;
    font-size: 10px;
    font-family: 'Cairo', sans-serif;
  }

  .gregorian-line .coptic {
    font-size: 11px;
    border: 1px solid #1a3a6b;
    padding: 1px 7px;
    border-radius: 10px;
    direction: rtl;
  }

  /* Prayer times table */
  .prayer-table {
    width: 100%;
    border-collapse: collapse;
    margin-top: 6px;
    font-size: 9px;
    direction: rtl;
    table-layout: fixed;
  }

  .prayer-table th, .prayer-table td {
    padding: 3px 1px;
    text-align: center;
    border: 0.5px solid #c5cfe0;
    color: #1a3a6b;
    overflow: hidden;
    white-space: nowrap;
    word-break: keep-all;
  }

  .prayer-table th:first-child,
  .prayer-table td:first-child {
    width: 18%;
  }

  .prayer-table th:not(:first-child),
  .prayer-table td:not(:first-child) {
    width: 13.6%;
  }

  .prayer-table th {
    background: #f0f4fa;
    font-weight: 700;
    font-size: 9px;
  }

  .prayer-table td:first-child {
    font-weight: 700;
    background: #f8f9fc;
    text-align: center;
    padding: 3px 1px;
  }

  .prayer-table tr:nth-child(even) td {
    background: #f5f7fb;
  }

  .prayer-table tr:nth-child(even) td:first-child {
    background: #eef1f7;
  }

  /* Footer */
  .footer {
    text-align: center;
    font-family: 'Amiri', serif;
    font-size: 16px;
    font-weight: 700;
    color: #1a3a6b;
    margin-top: 10px;
    padding-top: 8px;
    border-top: 1px solid #c5cfe0;
  }

  /* Location selector */
  .location-bar {
    display: flex;
    justify-content: center;
    gap: 6px;
    margin-bottom: 8px;
    flex-wrap: wrap;
  }

  .loc-btn {
    font-family: 'Cairo', sans-serif;
    font-size: 10px;
    padding: 2px 10px;
    border: 1px solid #1a3a6b;
    border-radius: 12px;
    background: white;
    color: #1a3a6b;
    cursor: pointer;
    transition: all 0.2s;
  }

  .loc-btn.active, .loc-btn:hover {
    background: #1a3a6b;
    color: white;
  }
</style>
</head>
<body>

<div class="widget" id="widget">
  <!-- Location selector -->
  <div class="location-bar" id="locationBar"></div>

  <!-- Day Name -->
  <div class="day-name-ar" id="dayAr">الخميس</div>
  <div class="day-name-en" id="dayEn">THURSDAY</div>

  <!-- Dates Row -->
  <div class="dates-row">
    <!-- Hijri -->
    <div class="date-block">
      <span class="date-num" id="hijriDay">١٢</span>
      <span class="date-month-ar" id="hijriMonth">رجــب</span>
      <span class="date-year" id="hijriYear">١٤٤٧</span>
    </div>
    <!-- Gregorian -->
    <div class="date-block">
      <span class="date-num" id="gregDay">١</span>
      <span class="date-month-ar" id="gregMonth">يناير</span>
      <span class="date-year" id="gregYear">٢٠٢٦</span>
    </div>
  </div>

  <!-- Gregorian + Coptic line -->
  <div class="gregorian-line">
    <span id="copticSpan" class="coptic">٢٣ كيهك ١٧٤٢</span>
    <span class="badge" id="gregLineFull">1 JANUARY 2026</span>
  </div>

  <!-- Prayer Times Table -->
  <table class="prayer-table">
    <thead>
      <tr>
        <th>المواقيت</th>
        <th>فجر</th>
        <th>شروق</th>
        <th>ظهر</th>
        <th>عصر</th>
        <th>مغرب</th>
        <th>عشاء</th>
      </tr>
    </thead>
    <tbody id="prayerBody"></tbody>
  </table>

  <!-- Footer greeting -->
  <div class="footer">كل عام وأنتم بخير</div>
</div>

<script>
// ---- Data & Config ----
const CITIES = [
  { name: 'القاهرة', lat: 30.0444, lng: 31.2357 },
  { name: 'الإسكندرية', lat: 31.2001, lng: 29.9187 },
  { name: 'المنصورة', lat: 31.0364, lng: 31.3807 },
  { name: 'أسوان', lat: 24.0889, lng: 32.8998 },
];

const AR_DAYS = ['الأحد','الاثنين','الثلاثاء','الأربعاء','الخميس','الجمعة','السبت'];
const EN_DAYS = ['SUNDAY','MONDAY','TUESDAY','WEDNESDAY','THURSDAY','FRIDAY','SATURDAY'];
const AR_MONTHS_G = ['يناير','فبراير','مارس','أبريل','مايو','يونيو','يوليو','أغسطس','سبتمبر','أكتوبر','نوفمبر','ديسمبر'];
const EN_MONTHS = ['JANUARY','FEBRUARY','MARCH','APRIL','MAY','JUNE','JULY','AUGUST','SEPTEMBER','OCTOBER','NOVEMBER','DECEMBER'];
const AR_MONTHS_H = ['محرم','صفر','ربيع الأول','ربيع الآخر','جمادى الأولى','جمادى الآخرة','رجب','شعبان','رمضان','شوال','ذو القعدة','ذو الحجة'];

// Arabic numeral converter
function toAr(n) {
  return String(n).replace(/\d/g, d => '٠١٢٣٤٥٦٧٨٩'[d]);
}

// ---- Hijri Conversion (Umm al-Qura approximate) ----
function toHijri(date) {
  const jd = Math.floor((date - new Date(1970,0,1)) / 86400000) + 2440588;
  let l = jd - 1948440 + 10632;
  const n = Math.floor((l - 1) / 10631);
  l = l - 10631 * n + 354;
  const j = (Math.floor((10985 - l) / 5316)) * (Math.floor((50 * l) / 17719)) +
            (Math.floor(l / 5670)) * (Math.floor((43 * l) / 15238));
  l = l - (Math.floor((30 - j) / 15)) * (Math.floor((17719 * j) / 50)) -
      (Math.floor(j / 16)) * (Math.floor((15238 * j) / 43)) + 29;
  const month = Math.floor((24 * l) / 709);
  const day = l - Math.floor((709 * month) / 24);
  const year = 30 * n + j - 30;
  return { day, month, year };
}

// ---- Coptic Conversion ----
const COPTIC_MONTHS = ['توت','بابه','هاتور','كيهك','طوبه','أمشير','برمهات','برموده','بشنس','بؤونه','أبيب','مسرى','النسيء'];
function toCoptic(date) {
  // approximate
  const jd = Math.floor(date.getTime() / 86400000) + 2440588;
  const r = jd - 1825030;
  const yr = Math.floor((r + 1) / 1461) * 4 + Math.floor(((r + 1) % 1461) / 365);
  const rem = (r + 1) - (Math.floor(yr / 4) * 1461 + (yr % 4) * 365);
  const month = Math.floor(rem / 30);
  const day = rem % 30 + 1;
  // Coptic era offset from Julian
  const copticYear = Math.floor((date.getFullYear() - 284) * 365.25 / 365.25);
  // simpler approach
  const base = new Date(date);
  const diff = Math.floor((base - new Date(284, 8, 29)) / 86400000);
  const cYear = Math.floor(diff / 365.25);
  const dayOfYear = diff - Math.floor(cYear * 365.25);
  const cMonth = Math.floor(dayOfYear / 30);
  const cDay = (dayOfYear % 30) + 1;
  return { day: cDay, month: cMonth, year: cYear };
}

// ---- Prayer Times (Egyptian General Authority method) ----
function calcPrayer(date, lat, lng) {
  const D2R = Math.PI / 180;
  const R2D = 180 / Math.PI;

  // Julian day number
  const JD = Math.floor(date.getTime() / 86400000) + 2440587.5 + 0.5;
  const n = JD - 2451545.0;

  // Sun position
  const L = (280.460 + 0.9856474 * n) % 360;
  const g = (357.528 + 0.9856003 * n) % 360;
  const gR = g * D2R;
  const lam = L + 1.915 * Math.sin(gR) + 0.020 * Math.sin(2 * gR);
  const lamR = lam * D2R;

  // Declination & equation of time
  const eps = (23.439 - 0.0000004 * n) * D2R;
  const sinDec = Math.sin(eps) * Math.sin(lamR);
  const decl = Math.asin(sinDec);
  const RA = R2D * Math.atan2(Math.cos(eps) * Math.sin(lamR), Math.cos(lamR)) / 15;
  // EqT fixed: normalize to small correction value
  let EqT = L / 15 - RA;
  while (EqT > 1)  EqT -= 24;
  while (EqT < -1) EqT += 24;

  // UTC offset from device
  const utcOffset = -date.getTimezoneOffset() / 60;
  // Solar noon (local time)
  const transit = 12 - lng / 15 + utcOffset - EqT;

  // Hour angle for elevation angle (deg)
  function hourAngle(alt) {
    const cosH = (Math.sin(alt * D2R) - Math.sin(lat * D2R) * sinDec) /
                 (Math.cos(lat * D2R) * Math.cos(decl));
    if (cosH < -1 || cosH > 1) return null;
    return R2D * Math.acos(cosH) / 15;
  }

  // Asr shadow factor = 1 (Shafi)
  function asrHourAngle() {
    const altDeg = R2D * Math.atan(1 / (1 + Math.tan(Math.abs(lat * D2R - decl))));
    return hourAngle(altDeg);
  }

  // Format: HH:MM always, 12-hour for afternoon/evening
  function fmt(h) {
    if (h === null || isNaN(h)) return '--:--';
    let t = ((h % 24) + 24) % 24;
    let hr = Math.floor(t);
    let mn = Math.round((t - hr) * 60);
    if (mn === 60) { hr = (hr + 1) % 24; mn = 0; }
    if (t < 12) {
      return String(hr).padStart(2,'0') + ':' + String(mn).padStart(2,'0');
    } else {
      const hr12 = hr === 12 ? 12 : hr - 12;
      return String(hr12).padStart(2,'0') + ':' + String(mn).padStart(2,'0');
    }
  }

  const fajrH    = hourAngle(-19.5);
  const sunriseH = hourAngle(-0.833);
  const asrH     = asrHourAngle();
  const ishaH    = hourAngle(-17.5);

  return {
    fajr:    fajrH    !== null ? fmt(transit - fajrH)    : '--:--',
    sunrise: sunriseH !== null ? fmt(transit - sunriseH) : '--:--',
    dhuhr:   fmt(transit),
    asr:     asrH     !== null ? fmt(transit + asrH)     : '--:--',
    maghrib: sunriseH !== null ? fmt(transit + sunriseH) : '--:--',
    isha:    ishaH    !== null ? fmt(transit + ishaH)    : '--:--',
  };
}

// ---- Render ----
let currentCity = 0;

function render() {
  const now = new Date();

  // Day
  document.getElementById('dayAr').textContent = AR_DAYS[now.getDay()];
  document.getElementById('dayEn').textContent = EN_DAYS[now.getDay()];

  // Gregorian
  document.getElementById('gregDay').textContent = toAr(now.getDate());
  document.getElementById('gregMonth').textContent = AR_MONTHS_G[now.getMonth()];
  document.getElementById('gregYear').textContent = toAr(now.getFullYear());
  document.getElementById('gregLineFull').textContent =
    now.getDate() + ' ' + EN_MONTHS[now.getMonth()] + ' ' + now.getFullYear();

  // Hijri
  const h = toHijri(now);
  document.getElementById('hijriDay').textContent = toAr(h.day);
  document.getElementById('hijriMonth').textContent = AR_MONTHS_H[h.month - 1] || '';
  document.getElementById('hijriYear').textContent = toAr(h.year);

  // Coptic (approximate)
  const cop = toCoptic(now);
  document.getElementById('copticSpan').textContent =
    toAr(cop.day > 0 && cop.day < 32 ? cop.day : now.getDate()) + ' ' +
    (COPTIC_MONTHS[cop.month % 13] || 'توت') + ' ' + toAr(cop.year > 0 ? cop.year : 1742);

  // Prayer times - all cities (sync calculation)
  const tbody = document.getElementById('prayerBody');
  tbody.innerHTML = '';
  CITIES.forEach((city) => {
    const pt = calcPrayer(now, city.lat, city.lng);
    const tr = document.createElement('tr');
    tr.innerHTML = `
      <td>${city.name}</td>
      <td>${pt.fajr}</td>
      <td>${pt.sunrise}</td>
      <td>${pt.dhuhr}</td>
      <td>${pt.asr}</td>
      <td>${pt.maghrib}</td>
      <td>${pt.isha}</td>
    `;
    tbody.appendChild(tr);
  });
}

// Location buttons
const bar = document.getElementById('locationBar');
CITIES.forEach((c, i) => {
  const btn = document.createElement('button');
  btn.className = 'loc-btn' + (i === 0 ? ' active' : '');
  btn.textContent = c.name;
  btn.onclick = () => {
    document.querySelectorAll('.loc-btn').forEach(b => b.classList.remove('active'));
    btn.classList.add('active');
    currentCity = i;
  };
  bar.appendChild(btn);
});

// Initial render + auto-update every minute
render();
setInterval(render, 60000);
</script>
</body>
</html>
